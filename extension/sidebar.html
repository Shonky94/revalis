<!DOCTYPE html>
<html>
<head>
  <title>ContextSnap Sidebar</title>
  <link rel="stylesheet" href="styles.css" />
  <meta charset="UTF-8">
</head>
<body>
  <div id="sidebar" class="sidebar">
    <button id="drag-popout-btn" style="display:none; position:absolute; top:8px; right:8px; width:28px; height:28px; border-radius:50%; background:#10a37f; border:none; cursor:grab; z-index:2000; align-items:center; justify-content:center;">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="#fff" stroke-width="2"/><path d="M7 10h6" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <div id="container">
      <header class="header">
        <div class="header-row">
          <div class="logo">
            <img src="icon.png" alt="ContextSnap Logo" style="width:32px;height:32px;vertical-align:middle;margin-right:8px;" />
            <h1 style="display:inline;vertical-align:middle;">ContextSnap</h1>
          </div>
          <div class="header-actions">
            <button id="api-settings-toggle" class="api-settings-toggle" title="API Settings" aria-label="API Settings">
              &#9881;
            </button>
            <div class="mode-toggle">
              <label class="toggle-switch">
                <input type="checkbox" id="hyper-search-toggle">
                <span class="toggle-slider"></span>
              </label>
              <span class="toggle-label" id="toggle-label">Manual Mode</span>
            </div>
            <button id="clear-history-btn" title="Clear history" aria-label="Clear history" class="clear-btn">
              <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
                <path d="M3 6h14M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v10a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button id="popout-btn" title="Pop out sidebar" class="popout-btn" aria-label="Pop out sidebar">
              <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                <rect x="3" y="3" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
                <path d="M7 7h6v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>
      </header>
      <!-- Collapsible API settings, hidden by default -->
      <div id="api-settings-section" class="collapsible-api-settings">
        <div class="auth-section">
          <div class="section-label">🔐 API Configuration</div>
          <div class="auth-content">
            <div class="provider-selector">
              <label>Provider:</label>
              <select id="provider-select">
                <option value="openai">OpenAI</option>
                <option value="openrouter">OpenRouter</option>
                <option value="anthropic">Anthropic</option>
                <option value="perplexity">Perplexity</option>
                <option value="gemini">Google Gemini</option>
                <option value="cohere">Cohere</option>
              </select>
            </div>
            <div class="api-key-input">
              <label>API Key:</label>
              <input type="password" id="api-key-input" placeholder="Enter your API key">
              <div class="key-buttons">
                <button id="save-key-btn">Save</button>
                <button id="test-key-btn">Test</button>
              </div>
            </div>
            <div class="key-status">
              <span id="key-status">No API key configured</span>
            </div>
          </div>
        </div>
      </div>
      <main class="content chat-history" style="flex:1 1 auto; min-height:0;">
        <div id="chat-container" class="chat-container">
          <!-- Chat messages will be dynamically added here -->
          <div class="placeholder-message">
            <div class="placeholder-icon">💭</div>
            <p>Select text on the page to get an AI explanation</p>
          </div>
        </div>
      </main>
    </div>
    <div class="resize-handle" style="display:none;"></div>
  </div>
  <button id="jump-to-latest-btn" title="Jump to latest response" style="position: fixed; bottom: 24px; right: 24px; z-index: 1001; display: none; background: #10a37f; color: white; border: none; border-radius: 50%; width: 48px; height: 48px; font-size: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); cursor: pointer;">↓</button>
  <script src="security.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
